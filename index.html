staurant (dine in robes)`},{time:`~3:00 PM`,activity:`Depart Blue Lagoon → KEF (~20 min)`},{time:`5:05–5:10 PM`,activity:`Depart KEF — Jamie: FI631 → BOS | Zak: FI603 → YYZ`}],notes:[`Blue Lagoon: Ref WBL05565072 — Retreat Spa — May 11 at 11:00 AM`,`Jamie: FI631 KEF 17:10 → BOS 18:50 — Saga Premium, Seat 05A`,`Zak: FI603 KEF 17:05 → YYZ 19:10`]}],ju=[{name:`Keflavík International Airport (KEF)`,position:{lat:63.985,lng:-22.6056},type:`airport`,description:`Iceland's international gateway on the Reykjanes Peninsula. Your journey starts here at 7:30 AM after picking up the Land Rover Defender PHEV.`,image:`https://images.unsplash.com/photo-1490258991646-162ba0764eb7?w=800&q=80`,link:`https://www.isavia.is/en/keflavik-airport`},{name:`Hvalfjörður Tunnel`,position:{lat:64.354,lng:-21.74},type:`tunnel`,description:`Iceland's longest tunnel at 5.77 km, passing 165m under the Hvalfjörður fjord. Saves 45 km vs the old route around the fjord.`,facts:[`5,770 meters long`,`165m below sea level`,`Opened July 1998`,`Toll-free since 2018`],image:`https://images.unsplash.com/photo-1509541206217-cde45c41aa6d?w=800&q=80`},{name:`Borgarnes`,position:{lat:64.5437,lng:-21.9107},type:`gas`,description:`Charming coastal town on Borgarfjörður. First fuel stop — fill up at the N1 station. Grab a coffee and Icelandic pastry at the café.`,facts:[`Population ~2,000`,`Gateway to West Iceland`,`N1 station open 08:00–23:00`,`Settlement Centre museum`],image:`https://images.unsplash.com/photo-1474540412665-1cdae210ae6b?w=800&q=80`},{name:`Hraunfossar & Barnafoss`,position:{lat:64.7029,lng:-20.9772},type:`waterfall`,description:`Extraordinary lava waterfalls where spring water streams through a lava field into the Hvítá river across a 1 km stretch. A short detour from Route 1.`,facts:[`Water flows from beneath Hallmundarhraun lava field`,`Stretches ~1 km along river`,`Adjacent Barnafoss ("Children's Waterfall") has a darker legend`,`Free parking & easy access`],image:`https://images.unsplash.com/p  ~11:00 PM in May`,`Private rooms, ensuite, full board`],image:`https://images.unsplash.com/photo-GKcJPUBnO5A?w=800&q=80`}],Mu=[{lat:63.985,lng:-22.606},{lat:64.07,lng:-22},{lat:64.15,lng:-21.94},{lat:64.354,lng:-21.74},{lat:64.54,lng:-21.91},{lat:64.7,lng:-21.2},{lat:64.83,lng:-20.65},{lat:65.1,lng:-20.5},{lat:65.3,lng:-20.4},{lat:65.66,lng:-20.29},{lat:65.75,lng:-19.8},{lat:65.8,lng:-19.1},{lat:65.78,lng:-18.6},{lat:65.68,lng:-18.09},{lat:65.68,lng:-17.8},{lat:65.68,lng:-17.55},{lat:65.7,lng:-17.45},{lat:65.72,lng:-17.39}],Nu=[{name:`Hraun (Efra)`,session:1,day:`Friday PM`,time:`1:00–6:00 PM`,position:{lat:65.695,lng:-17.42},water:`Laxá í Aðaldal`,target:`Brown Trout`,description:`Your first session on the legendary Laxá. The Hraun beat is exceptionally diverse with island features and channels. From the sign at Klambrey island downstream to Skáleyjarstraumur. Perfect for dry-fly fishing when conditions allow.`,characteristics:[`Very diverse water`,`Island features create channels`,`Perfect for dry-fly fishing`,`Pristine natural setting`,`2–3 rods per session`],image:`https://images.unsplash.com/photo-Y19Sstu3_DI?w=800&q=80`,stats:{"Avg Fish Size":`19" (48 cm)`,"Top Fish":`26" (66 cm)`,Method:`Fly only`,"Season Catch":`400–800 trout`}},{name:`Múlatorfa`,session:2,day:`Saturday AM`,time:`9:00 AM–12:30 PM`,position:{lat:65.715,lng:-17.38},water:`Laxá í Aðaldal`,target:`Brown Trout`,description:`One of the premier beats on the Laxá system. Rich insect life produces well-fed, powerful brown trout averaging 19 inches with specimens regularly reaching 26 inches. Morning light on the water here is magical.`,characteristics:[`Premier Laxá beat`,`Rich insect hatches`,`Powerful brown trout`,`Morning fishing at its best`,`2–3 rods per session`],image:`https://images.unsplash.com/photo-oRNruBJQqfo?w=800&q=80`,stats:{"Avg Fish Size":`19" (48 cm)`,"Top Fish":`26" (66 cm)`,Method:`Fly only`,"Catch Rate":`Excellent`}},{name:`Geitafellsá`,session:3,day:`Saturday PM`,time:`2:00–6:0
