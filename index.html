var rawKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),{name:'PBKDF2'},false,['deriveBits']);
var bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:600000,hash:'SHA-256'},rawKey,256);
var aesKey=await crypto.subtle.importKey('raw',bits,{name:'AES-CBC'},false,['decrypt']);
var raw=Uint8Array.from(atob(enc),function(c){return c.charCodeAt(0)});
var dec=await crypto.subtle.decrypt({name:'AES-CBC',iv:iv},aesKey,raw);
var html=new TextDecoder().decode(dec);
document.open();document.write(html);document.close();
